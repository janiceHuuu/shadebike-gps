<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShadeBike GPS Navigation Test</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      text-align: center;
      background: #f4f4f4;
    }

    h1 {
      font-size: 28px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin: 16px auto;
      max-width: 430px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    .label {
      font-size: 16px;
      color: #666;
      margin-top: 12px;
    }

    .value {
      font-size: 23px;
      font-weight: bold;
      word-break: break-all;
    }

    button {
      width: 90%;
      max-width: 430px;
      padding: 18px;
      font-size: 23px;
      border: none;
      border-radius: 16px;
      color: white;
      background: #2980b9;
      margin-top: 14px;
    }

    .status {
      font-size: 20px;
      color: #333;
      margin-top: 20px;
      font-weight: bold;
    }

    .trigger {
      color: #c0392b;
      font-size: 24px;
    }
  </style>
</head>

<body>
  <h1>ShadeBike GPS Navigation Test</h1>

  <button onclick="startGPS()">Start GPS</button>

  <div class="card">
    <div class="label">Current Latitude</div>
    <div class="value" id="lat">--</div>

    <div class="label">Current Longitude</div>
    <div class="value" id="lon">--</div>

    <div class="label">Accuracy</div>
    <div class="value" id="acc">--</div>

    <div class="label">Distance to Next Point</div>
    <div class="value" id="dist">--</div>
  </div>

  <div class="card">
    <div class="label">Next Action</div>
    <div class="value" id="action">R</div>

    <div class="label">Trigger Radius</div>
    <div class="value">10 m</div>
  </div>

  <div class="status" id="status">Press Start GPS</div>

  <script>
    // ===== 測試導航點：請改成你目前附近的座標 =====
    const targetLat = 22.99876019;
    const targetLon = 120.21985536;
    const targetAction = "R";
    const triggerDistance = 10; // 公尺

    let watchId = null;
    let hasTriggered = false;

    function startGPS() {
      if (!navigator.geolocation) {
        document.getElementById("status").innerHTML = "This browser does not support GPS.";
        return;
      }

      document.getElementById("status").innerHTML = "Requesting GPS permission...";

      watchId = navigator.geolocation.watchPosition(
        function(position) {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          const acc = position.coords.accuracy;

          const d = distanceMeters(lat, lon, targetLat, targetLon);

          document.getElementById("lat").innerHTML = lat.toFixed(8);
          document.getElementById("lon").innerHTML = lon.toFixed(8);
          document.getElementById("acc").innerHTML = acc.toFixed(1) + " m";
          document.getElementById("dist").innerHTML = d.toFixed(1) + " m";

          if (d <= triggerDistance && !hasTriggered) {
            hasTriggered = true;
          
            document.getElementById("status").innerHTML =
              "<span class='trigger'>Trigger: " + targetAction + "</span>";
          
            sendCommandToESP32(targetAction);
          }
          else if (!hasTriggered) {
            document.getElementById("status").innerHTML = "GPS updated";
          }
        },
        function(error) {
          let msg = "";

          if (error.code === 1) msg = "Permission denied. Please allow location access.";
          else if (error.code === 2) msg = "Position unavailable.";
          else if (error.code === 3) msg = "GPS timeout.";
          else msg = "Unknown GPS error.";

          document.getElementById("status").innerHTML = msg;
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }

    function distanceMeters(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const phi1 = lat1 * Math.PI / 180;
      const phi2 = lat2 * Math.PI / 180;
      const dPhi = (lat2 - lat1) * Math.PI / 180;
      const dLambda = (lon2 - lon1) * Math.PI / 180;

      const a =
        Math.sin(dPhi / 2) * Math.sin(dPhi / 2) +
        Math.cos(phi1) * Math.cos(phi2) *
        Math.sin(dLambda / 2) * Math.sin(dLambda / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

      return R * c;
    }
    function sendCommandToESP32(action) {
      const esp32IP = "172.20.10.2";
      const url = "http://" + esp32IP + "/cmd?dir=" + action + "&t=" + Date.now();
    
      document.getElementById("status").innerHTML =
        "<span class='trigger'>Sending to ESP32: " + action + "</span>";
    
      const img = new Image();
      img.src = url;
    
      setTimeout(function() {
        document.getElementById("status").innerHTML =
          "<span class='trigger'>Command sent attempt: " + action + "</span>";
      }, 500);
    }
  </script>
</body>
</html>
