<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShadeBike GPS Navigation</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      text-align: center;
      background: #f4f4f4;
    }

    h1 {
      font-size: 28px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin: 16px auto;
      max-width: 430px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    .label {
      font-size: 16px;
      color: #666;
      margin-top: 12px;
    }

    .value {
      font-size: 22px;
      font-weight: bold;
      word-break: break-all;
    }

    button {
      width: 90%;
      max-width: 430px;
      padding: 18px;
      font-size: 22px;
      border: none;
      border-radius: 16px;
      color: white;
      background: #2980b9;
      margin-top: 14px;
      cursor: pointer;
    }

    .test-btn {
      background: #e67e22;
    }

    .reset-btn {
      background: #7f8c8d;
    }

    .stop-btn {
      background: #c0392b;
    }

    .status {
      font-size: 20px;
      color: #333;
      margin-top: 20px;
      font-weight: bold;
    }

    .trigger {
      color: #c0392b;
      font-size: 24px;
      font-weight: bold;
    }

    #map {
      width: 100%;
      max-width: 430px;
      height: 380px;
      margin: 16px auto;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      overflow: hidden;
    }
  </style>
</head>

<body>
  <h1>ShadeBike GPS Navigation</h1>

  <button onclick="startGPS()">Start GPS and Request Route</button>
  <button class="test-btn" onclick="sendCommandToESP32('R')">Test Send R to ESP32</button>
  <button class="test-btn" onclick="sendCommandToESP32('L')">Test Send L to ESP32</button>
  <button class="test-btn" onclick="sendCommandToESP32('A')">Test Send A to ESP32</button>
  <button class="reset-btn" onclick="resetRoute()">Reset Route</button>
  <button class="stop-btn" onclick="stopGPS()">Stop GPS</button>

  <div id="map"></div>

  <div class="card">
    <div class="label">Current Latitude</div>
    <div class="value" id="lat">--</div>

    <div class="label">Current Longitude</div>
    <div class="value" id="lon">--</div>

    <div class="label">Accuracy</div>
    <div class="value" id="acc">--</div>
  </div>

  <div class="card">
    <div class="label">Destination</div>
    <div class="value" id="dest">23.0015, 120.2190</div>

    <div class="label">Trigger Radius</div>
    <div class="value" id="radius">10 m</div>
  </div>

  <div class="card">
    <div class="label">Route Status</div>
    <div class="value" id="routeStatus">No route yet</div>

    <div class="label">Next Navigation Point</div>
    <div class="value" id="nextPoint">--</div>

    <div class="label">Distance to Next Point</div>
    <div class="value" id="dist">--</div>

    <div class="label">Next Action</div>
    <div class="value" id="action">--</div>
  </div>

  <div class="card">
    <div class="label">Command Status</div>
    <div class="value" id="commandStatus">No command sent yet</div>
  </div>

  <div class="status" id="status">Press Start GPS</div>

  <script>
    const SERVER_BASE_URL = "https://shadebike-server.onrender.com";

    const DEST_LAT = 23.0015;
    const DEST_LON = 120.2190;

    const TRIGGER_DISTANCE = 10;

    let watchId = null;

    let routePoints = [];
    let routeGeometry = [];
    let currentRouteIndex = 0;
    let routeLoaded = false;
    let routeRequesting = false;
    let lastSentIndex = -1;

    let map = null;
    let currentMarker = null;
    let destMarker = null;
    let routeLine = null;
    let nextMarker = null;
    let routePointMarkers = [];

      function initMap() {
        if (map !== null) {
          return;
        }
      
        map = L.map("map").setView([DEST_LAT, DEST_LON], 16);
      
        // ArcGIS Pro 使用的 Topographic / World_Topo_Map 底圖
        L.tileLayer(
          "https://services.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}",
          {
            maxZoom: 19,
            attribution: "Tiles © Esri"
          }
        ).addTo(map);
      
        destMarker = L.marker([DEST_LAT, DEST_LON]).addTo(map);
        destMarker.bindPopup("Destination");
      }

      destMarker = L.marker([DEST_LAT, DEST_LON]).addTo(map);
      destMarker.bindPopup("Destination");
    }

    function startGPS() {
      initMap();

      if (!navigator.geolocation) {
        document.getElementById("status").innerHTML =
          "This browser does not support GPS.";
        return;
      }

      if (watchId !== null) {
        document.getElementById("status").innerHTML =
          "GPS is already running.";
        return;
      }

      document.getElementById("status").innerHTML =
        "Requesting GPS permission...";

      watchId = navigator.geolocation.watchPosition(
        handlePosition,
        handleGPSError,
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }

    function handlePosition(position) {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      const acc = position.coords.accuracy;

      document.getElementById("lat").innerHTML = lat.toFixed(8);
      document.getElementById("lon").innerHTML = lon.toFixed(8);
      document.getElementById("acc").innerHTML = acc.toFixed(1) + " m";

      updateCurrentLocationOnMap(lat, lon);

      if (!routeLoaded && !routeRequesting) {
        requestRoute(lat, lon);
        return;
      }

      if (routeLoaded) {
        checkRouteProgress(lat, lon);
      }
    }

    function handleGPSError(error) {
      let msg = "";

      if (error.code === 1) {
        msg = "Permission denied. Please allow location access.";
      } else if (error.code === 2) {
        msg = "Position unavailable.";
      } else if (error.code === 3) {
        msg = "GPS timeout.";
      } else {
        msg = "Unknown GPS error.";
      }

      document.getElementById("status").innerHTML = msg;
    }

    function requestRoute(startLat, startLon) {
      routeRequesting = true;

      const url =
        SERVER_BASE_URL +
        "/route?start_lat=" + encodeURIComponent(startLat) +
        "&start_lon=" + encodeURIComponent(startLon) +
        "&dest_lat=" + encodeURIComponent(DEST_LAT) +
        "&dest_lon=" + encodeURIComponent(DEST_LON);

      document.getElementById("status").innerHTML =
        "Requesting route from Render...";

      document.getElementById("routeStatus").innerHTML =
        "Requesting route...";

      fetch(url)
        .then(response => response.json())
        .then(data => {
          routeRequesting = false;

          if (!data.ok) {
            routeLoaded = false;

            document.getElementById("status").innerHTML =
              "Route failed: " + data.message;

            document.getElementById("routeStatus").innerHTML =
              "Route failed.";

            return;
          }

          routePoints = data.route;
          routeGeometry = data.route_geometry || [];

          if (routePoints.length > 1) {
            currentRouteIndex = 1;
          } else {
            currentRouteIndex = 0;
          }

          lastSentIndex = -1;
          routeLoaded = true;

          document.getElementById("routeStatus").innerHTML =
            "Route loaded" +
            "<br>Points: " + routePoints.length +
            "<br>Geometry points: " + routeGeometry.length +
            "<br>Start node: " + data.start_node +
            "<br>Dest node: " + data.dest_node +
            "<br>Total cost: " + Number(data.total_cost).toFixed(2);

          document.getElementById("status").innerHTML =
            "Route loaded. Start navigation.";

          drawRouteOnMap();
          updateNextPointDisplay();
        })
        .catch(error => {
          routeRequesting = false;
          routeLoaded = false;

          document.getElementById("status").innerHTML =
            "Failed to request route.";

          document.getElementById("routeStatus").innerHTML =
            "Route request error.";

          console.error(error);
        });
    }

    function checkRouteProgress(currentLat, currentLon) {
      if (!routeLoaded || routePoints.length === 0) {
        return;
      }

      if (currentRouteIndex >= routePoints.length) {
        document.getElementById("status").innerHTML =
          "Navigation finished.";

        document.getElementById("nextPoint").innerHTML =
          "Arrived.";

        document.getElementById("dist").innerHTML =
          "--";

        document.getElementById("action").innerHTML =
          "--";

        updateNextMarker();
        return;
      }

      const target = routePoints[currentRouteIndex];

      const d = distanceMeters(
        currentLat,
        currentLon,
        target.lat,
        target.lon
      );

      document.getElementById("nextPoint").innerHTML =
        "Index: " + currentRouteIndex +
        "<br>Node: " + target.node_id +
        "<br>Lat: " + Number(target.lat).toFixed(8) +
        "<br>Lon: " + Number(target.lon).toFixed(8);

      document.getElementById("dist").innerHTML =
        d.toFixed(1) + " m";

      document.getElementById("action").innerHTML =
        target.action;

      if (d <= TRIGGER_DISTANCE && lastSentIndex !== currentRouteIndex) {
        lastSentIndex = currentRouteIndex;

        document.getElementById("status").innerHTML =
          "<span class='trigger'>Trigger: " + target.action + "</span>";

        sendCommandToESP32(target.action);

        currentRouteIndex++;

        updateNextPointDisplay();
      } else {
        document.getElementById("status").innerHTML =
          "GPS updated. Navigating...";
      }
    }

    function updateCurrentLocationOnMap(lat, lon) {
      if (map === null) {
        return;
      }

      if (currentMarker === null) {
        currentMarker = L.marker([lat, lon]).addTo(map);
        currentMarker.bindPopup("Current Location");
      } else {
        currentMarker.setLatLng([lat, lon]);
      }
    }

    function drawRouteOnMap() {
      if (map === null || routePoints.length === 0) {
        return;
      }

      let latlngs = [];

      if (routeGeometry && routeGeometry.length > 0) {
        latlngs = routeGeometry;
      } else {
        latlngs = routePoints.map(p => [p.lat, p.lon]);
      }

      if (routeLine !== null) {
        map.removeLayer(routeLine);
        routeLine = null;
      }

      for (let i = 0; i < routePointMarkers.length; i++) {
        map.removeLayer(routePointMarkers[i]);
      }
      routePointMarkers = [];

      routeLine = L.polyline(latlngs, {
        weight: 6,
        opacity: 0.85
      }).addTo(map);

      for (let i = 0; i < routePoints.length; i++) {
        const p = routePoints[i];

        const marker = L.circleMarker([p.lat, p.lon], {
          radius: 6,
          weight: 2,
          fillOpacity: 0.9
        }).addTo(map);

        marker.bindPopup(
          "Index: " + i +
          "<br>Node: " + p.node_id +
          "<br>Action: " + p.action
        );

        routePointMarkers.push(marker);
      }

      updateNextMarker();

      const bounds = L.latLngBounds(latlngs);

      if (currentMarker !== null) {
        bounds.extend(currentMarker.getLatLng());
      }

      bounds.extend([DEST_LAT, DEST_LON]);

      map.fitBounds(bounds, {
        padding: [30, 30]
      });
    }

    function updateNextPointDisplay() {
      if (!routeLoaded || routePoints.length === 0) {
        document.getElementById("nextPoint").innerHTML =
          "No route yet";

        document.getElementById("action").innerHTML =
          "--";

        updateNextMarker();
        return;
      }

      if (currentRouteIndex >= routePoints.length) {
        document.getElementById("nextPoint").innerHTML =
          "Arrived.";

        document.getElementById("action").innerHTML =
          "--";

        updateNextMarker();
        return;
      }

      const target = routePoints[currentRouteIndex];

      document.getElementById("nextPoint").innerHTML =
        "Index: " + currentRouteIndex +
        "<br>Node: " + target.node_id +
        "<br>Lat: " + Number(target.lat).toFixed(8) +
        "<br>Lon: " + Number(target.lon).toFixed(8);

      document.getElementById("action").innerHTML =
        target.action;

      updateNextMarker();
    }

    function updateNextMarker() {
      if (map === null) {
        return;
      }

      if (!routeLoaded || routePoints.length === 0 || currentRouteIndex >= routePoints.length) {
        if (nextMarker !== null) {
          map.removeLayer(nextMarker);
          nextMarker = null;
        }
        return;
      }

      const target = routePoints[currentRouteIndex];

      if (nextMarker === null) {
        nextMarker = L.marker([target.lat, target.lon]).addTo(map);
      } else {
        nextMarker.setLatLng([target.lat, target.lon]);
      }

      nextMarker.bindPopup(
        "Next action: " + target.action +
        "<br>Node: " + target.node_id +
        "<br>Index: " + currentRouteIndex
      );
    }

    function sendCommandToESP32(action) {
      const serverUrl =
        SERVER_BASE_URL + "/set?dir=" + encodeURIComponent(action);

      document.getElementById("commandStatus").innerHTML =
        "Sending command: " + action;

      fetch(serverUrl)
        .then(response => response.json())
        .then(data => {
          if (!data.ok) {
            document.getElementById("commandStatus").innerHTML =
              "Command failed: " + action;
            return;
          }

          document.getElementById("commandStatus").innerHTML =
            "Command sent: " + action + ", seq=" + data.seq;
        })
        .catch(error => {
          document.getElementById("commandStatus").innerHTML =
            "Failed to send command.";

          console.error(error);
        });
    }

    function resetRoute() {
      routePoints = [];
      routeGeometry = [];
      currentRouteIndex = 0;
      routeLoaded = false;
      routeRequesting = false;
      lastSentIndex = -1;

      document.getElementById("routeStatus").innerHTML =
        "No route yet";

      document.getElementById("nextPoint").innerHTML =
        "--";

      document.getElementById("dist").innerHTML =
        "--";

      document.getElementById("action").innerHTML =
        "--";

      document.getElementById("commandStatus").innerHTML =
        "No command sent yet";

      document.getElementById("status").innerHTML =
        "Route reset. GPS is still running if already started.";

      if (routeLine !== null && map !== null) {
        map.removeLayer(routeLine);
        routeLine = null;
      }

      if (map !== null) {
        for (let i = 0; i < routePointMarkers.length; i++) {
          map.removeLayer(routePointMarkers[i]);
        }
      }

      routePointMarkers = [];

      if (nextMarker !== null && map !== null) {
        map.removeLayer(nextMarker);
        nextMarker = null;
      }
    }

    function stopGPS() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }

      document.getElementById("status").innerHTML =
        "GPS stopped.";
    }

    function distanceMeters(lat1, lon1, lat2, lon2) {
      const R = 6371000;

      const phi1 = lat1 * Math.PI / 180;
      const phi2 = lat2 * Math.PI / 180;

      const dPhi = (lat2 - lat1) * Math.PI / 180;
      const dLambda = (lon2 - lon1) * Math.PI / 180;

      const a =
        Math.sin(dPhi / 2) * Math.sin(dPhi / 2) +
        Math.cos(phi1) * Math.cos(phi2) *
        Math.sin(dLambda / 2) * Math.sin(dLambda / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

      return R * c;
    }
  </script>
</body>
</html>
